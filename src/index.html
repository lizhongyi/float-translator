<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Float Translator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Mono:wght@300;400&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg: rgba(11,11,16,0.88);
  --border: rgba(255,255,255,0.07);
  --accent: #7EFFF5;
  --accent-glow: rgba(126,255,245,0.2);
  --accent-faint: rgba(126,255,245,0.07);
  --red: #FF6B8A;
  --red-glow: rgba(255,107,138,0.25);
  --text: rgba(255,255,255,0.9);
  --muted: rgba(255,255,255,0.35);
  --dim: rgba(255,255,255,0.16);
  --r: 14px;
}

html,body{width:100%;height:100%;background:transparent;overflow:hidden;
  font-family:'Syne',-apple-system,sans-serif}

.app{
  width:100%;height:100vh;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--r);
  backdrop-filter:blur(48px) saturate(160%);
  -webkit-backdrop-filter:blur(48px) saturate(160%);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;
}

/* ── Titlebar ── */
.bar{
  -webkit-app-region:drag;
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px 7px;flex-shrink:0;
}
.bar-left{display:flex;align-items:center;gap:7px}
.pulse{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 9px var(--accent);
  animation:pulse 3s ease-in-out infinite;
}
.pulse.recording{background:var(--red);box-shadow:0 0 9px var(--red);animation:pulse-fast 0.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes pulse-fast{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.logo{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

.bar-right{display:flex;gap:5px;-webkit-app-region:no-drag}
.ibtn{
  width:26px;height:26px;border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border-radius:7px;color:var(--muted);transition:all .15s;
}
.ibtn:hover{background:rgba(255,255,255,.07);color:var(--text)}
.ibtn svg{width:13px;height:13px}

/* ── Mode tabs ── */
.tabs{
  display:flex;gap:4px;padding:0 14px 8px;
  -webkit-app-region:no-drag;flex-shrink:0;
}
.tab{
  padding:4px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;cursor:pointer;
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);transition:all .18s;font-family:'Syne',sans-serif;
  display:flex;align-items:center;gap:5px;
}
.tab svg{width:10px;height:10px}
.tab.active{
  background:var(--accent-faint);
  border-color:rgba(126,255,245,.3);color:var(--accent);
}
.tab.active.voice-tab{
  background:rgba(255,107,138,.1);
  border-color:rgba(255,107,138,.35);color:var(--red);
}

/* ── Lang selector ── */
.lang-row{
  display:flex;align-items:center;gap:6px;padding:0 14px 9px;
  -webkit-app-region:no-drag;flex-shrink:0;
}
.lang-select{
  font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);background:rgba(255,255,255,.04);
  color:var(--muted);cursor:pointer;outline:none;
  font-family:'Syne',sans-serif;appearance:none;
  transition:all .15s;
}
.lang-select:focus{border-color:rgba(126,255,245,.3);color:var(--accent)}
.arr{color:var(--dim);font-size:10px}
.spacer{flex:1}
.hint{font-size:9px;color:var(--dim);letter-spacing:.04em}

/* ── Content panels ── */
.panel{flex:1;display:flex;flex-direction:column;padding:0 14px 14px;gap:8px;min-height:0;
  position:relative;z-index:1}
.panel.hidden{display:none}

/* textarea */
.inp-wrap{flex:1;position:relative;min-height:0}
textarea{
  width:100%;height:100%;min-height:52px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-size:12.5px;
  font-family:'DM Mono',monospace;font-weight:300;
  line-height:1.65;padding:10px 30px 10px 12px;
  resize:none;outline:none;transition:border-color .2s;
  caret-color:var(--accent);
}
textarea::placeholder{color:rgba(255,255,255,.18);font-family:'Syne',sans-serif;font-weight:400}
textarea:focus{border-color:rgba(255,255,255,.12)}
.x-btn{
  position:absolute;right:8px;top:8px;
  width:17px;height:17px;border-radius:50%;border:none;
  background:rgba(255,255,255,.07);color:var(--muted);
  cursor:pointer;display:none;align-items:center;justify-content:center;
  font-size:9px;transition:all .15s;
}
.x-btn:hover{background:rgba(255,255,255,.14);color:var(--text)}
textarea:not(:placeholder-shown) + .x-btn{display:flex}

/* divider row */
.div-row{display:flex;align-items:center;gap:8px;flex-shrink:0}
.div-line{flex:1;height:1px;background:var(--border)}
.tr-btn{
  display:flex;align-items:center;gap:5px;padding:5px 14px;
  border-radius:20px;border:1px solid rgba(126,255,245,.25);
  background:var(--accent-faint);color:var(--accent);
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;
}
.tr-btn:hover:not(:disabled){
  background:rgba(126,255,245,.22);
  border-color:rgba(126,255,245,.4);
  box-shadow:0 0 18px var(--accent-glow);
}
.tr-btn:disabled{opacity:.35;cursor:not-allowed}
.tr-btn svg{width:11px;height:11px}

/* output */
.out-wrap{flex:1;position:relative;min-height:0}
.out-box{
  width:100%;height:100%;min-height:52px;
  background:var(--accent-faint);
  border:1px solid rgba(126,255,245,.08);border-radius:10px;
  color:var(--text);font-size:12.5px;
  font-family:'DM Mono',monospace;font-weight:300;
  line-height:1.65;padding:10px 34px 10px 12px;
  overflow-y:auto;word-wrap:break-word;white-space:pre-wrap;
}
.out-box.empty{color:rgba(255,255,255,.18);font-style:italic;font-family:'Syne',sans-serif}
.out-box.error{color:var(--red);font-size:12px;font-family:'Syne',sans-serif}
.out-box.loading{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;font-family:'Syne',sans-serif}
.copy-btn{
  position:absolute;right:8px;bottom:8px;
  width:24px;height:24px;border-radius:6px;
  border:1px solid var(--border);background:rgba(255,255,255,.04);
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;opacity:0;
}
.out-wrap:hover .copy-btn{opacity:1}
.copy-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.copy-btn svg{width:12px;height:12px}

/* ── Voice Panel ── */
.voice-panel{flex:1;display:flex;flex-direction:column;padding:0 14px 14px;gap:8px;min-height:0}
.voice-panel.hidden{display:none}

.voice-center{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
}

.mic-btn{
  width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.06);
  border:1.5px solid var(--border);
  transition:all .25s;position:relative;
}
.mic-btn svg{width:26px;height:26px;color:var(--muted);transition:all .25s}
.mic-btn:hover{background:rgba(255,255,255,.1);border-color:var(--dim)}
.mic-btn:hover svg{color:var(--text)}
.mic-btn.active{
  background:rgba(255,107,138,.12);
  border-color:rgba(255,107,138,.45);
  box-shadow:0 0 28px var(--red-glow);
}
.mic-btn.active svg{color:var(--red)}

/* ripple rings */
.mic-btn.active::before,.mic-btn.active::after{
  content:'';position:absolute;border-radius:50%;
  border:1.5px solid rgba(255,107,138,.4);
  animation:ripple 1.8s ease-out infinite;
}
.mic-btn.active::before{width:80px;height:80px;animation-delay:0s}
.mic-btn.active::after{width:100px;height:100px;animation-delay:.5s}
@keyframes ripple{
  0%{transform:scale(.8);opacity:.8}
  100%{transform:scale(1.4);opacity:0}
}

.voice-status{
  font-size:11px;letter-spacing:.06em;color:var(--muted);
  text-align:center;transition:all .2s;
}
.voice-status.active{color:var(--red)}

/* live transcript box */
.live-box{
  width:100%;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:10px;
  padding:9px 12px;min-height:40px;
  font-size:12px;font-family:'DM Mono',monospace;font-weight:300;
  color:var(--text);line-height:1.6;overflow-y:auto;
  transition:border-color .2s;
}
.live-box.speaking{border-color:rgba(255,107,138,.25)}

.voice-div-row{display:flex;align-items:center;gap:8px;flex-shrink:0}

.voice-out-box{
  flex:1;background:var(--accent-faint);
  border:1px solid rgba(126,255,245,.08);border-radius:10px;
  padding:9px 12px;min-height:40px;
  font-size:12px;font-family:'DM Mono',monospace;font-weight:300;
  color:var(--text);line-height:1.6;overflow-y:auto;
  position:relative;
}
.voice-out-box.empty{color:rgba(255,255,255,.18);font-style:italic;font-family:'Syne',sans-serif}

/* dots loader */
.dots{display:flex;gap:4px;align-items:center}
.dots span{
  width:4px;height:4px;border-radius:50%;background:var(--accent);
  animation:db 1.2s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes db{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
</style>
</head>
<body>
<div class="app">

  <!-- Titlebar -->
  <div class="bar">
    <div class="bar-left">
      <div class="pulse" id="dot"></div>
      <span class="logo">Translator</span>
    </div>
    <div class="bar-right">
      <button class="ibtn" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
        </svg>
      </button>
      <button class="ibtn" id="closeBtn" title="Hide ⌘⇧T">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mode tabs -->
  <div class="tabs">
    <button class="tab active" id="tabText">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 4h12M2 8h8M2 12h10"/>
      </svg>
      文字
    </button>
    <button class="tab voice-tab" id="tabVoice">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="5" y="1" width="6" height="9" rx="3"/>
        <path d="M2 8s0 6 6 6 6-6 6-6M8 14v2"/>
      </svg>
      语音
    </button>
    <div class="spacer"></div>
  </div>

  <!-- Lang row (shared) -->
  <div class="lang-row">
    <span style="font-size:10px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase">Auto</span>
    <span class="arr">→</span>
    <select class="lang-select" id="targetLang">
      <option value="zh">ZH 中文</option>
      <option value="en">EN 英文</option>
      <option value="ja">JA 日语</option>
      <option value="ko">KO 韩语</option>
      <option value="fr">FR 法语</option>
      <option value="de">DE 德语</option>
      <option value="es">ES 西班牙</option>
      <option value="ru">RU 俄语</option>
    </select>
    <div class="spacer"></div>
    <span class="hint" id="hintText">⌘↵ 翻译</span>
  </div>

  <!-- ── TEXT PANEL ── -->
  <div class="panel" id="textPanel">
    <div class="inp-wrap">
      <textarea id="inputText" placeholder="粘贴或输入要翻译的文字…" spellcheck="false"></textarea>
      <button class="x-btn" id="clearBtn">✕</button>
    </div>

    <div class="div-row">
      <div class="div-line"></div>
      <button class="tr-btn" id="translateBtn" disabled>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 8h12M10 4l4 4-4 4"/>
        </svg>
        Translate
      </button>
      <div class="div-line"></div>
    </div>

    <div class="out-wrap">
      <div class="out-box empty" id="output">翻译结果将显示在这里</div>
      <button class="copy-btn" id="copyBtn" title="Copy">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="5" y="5" width="9" height="9" rx="1.5"/>
          <path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── VOICE PANEL ── -->
  <div class="voice-panel hidden" id="voicePanel">
    <div class="voice-center">
      <button class="mic-btn" id="micBtn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="5" y="1" width="6" height="9" rx="3"/>
          <path d="M2 8s0 6 6 6 6-6 6-6M8 14v2"/>
        </svg>
      </button>
      <span class="voice-status" id="voiceStatus">点击开始语音识别</span>
    </div>

    <!-- Live transcript -->
    <div class="live-box" id="liveBox" style="display:none"></div>

    <div class="voice-div-row">
      <div class="div-line"></div>
      <span style="font-size:9px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase">译文</span>
      <div class="div-line"></div>
    </div>

    <div class="out-wrap" style="flex:1">
      <div class="voice-out-box empty" id="voiceOutput">语音翻译结果</div>
      <button class="copy-btn" id="voiceCopyBtn" title="Copy">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="5" y="5" width="9" height="9" rx="1.5"/>
          <path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
const { ipcRenderer } = require('electron');

// ── State ──────────────────────────────────────────────────────────────────

let mode = 'text'; // 'text' | 'voice'
let translating = false;
let translatedText = '';
let voiceTranslatedText = '';
let isRecording = false;

// Audio recording
let mediaStream = null;
let audioContext = null;
let processor = null;
let asrReady = false;
let pendingTranscript = '';
let translateDebounce = null;

// ── DOM refs ───────────────────────────────────────────────────────────────

const dot = document.getElementById('dot');
const tabText = document.getElementById('tabText');
const tabVoice = document.getElementById('tabVoice');
const hintText = document.getElementById('hintText');

const textPanel = document.getElementById('textPanel');
const voicePanel = document.getElementById('voicePanel');

const inputText = document.getElementById('inputText');
const output = document.getElementById('output');
const translateBtn = document.getElementById('translateBtn');
const clearBtn = document.getElementById('clearBtn');
const copyBtn = document.getElementById('copyBtn');

const micBtn = document.getElementById('micBtn');
const voiceStatus = document.getElementById('voiceStatus');
const liveBox = document.getElementById('liveBox');
const voiceOutput = document.getElementById('voiceOutput');
const voiceCopyBtn = document.getElementById('voiceCopyBtn');

const settingsBtn = document.getElementById('settingsBtn');
const closeBtn = document.getElementById('closeBtn');
const targetLang = document.getElementById('targetLang');

// ── Load saved prefs ───────────────────────────────────────────────────────

targetLang.value = localStorage.getItem('targetLang') || 'en';
targetLang.addEventListener('change', () => {
  localStorage.setItem('targetLang', targetLang.value);
});

// ── Tab switching ──────────────────────────────────────────────────────────

tabText.addEventListener('click', () => switchMode('text'));
tabVoice.addEventListener('click', () => switchMode('voice'));

function switchMode(m) {
  mode = m;
  if (m === 'text') {
    tabText.classList.add('active'); tabText.classList.remove('voice-tab');
    tabVoice.classList.remove('active');
    textPanel.classList.remove('hidden');
    voicePanel.classList.add('hidden');
    hintText.textContent = '⌘↵ 翻译';
    if (isRecording) stopRecording();
  } else {
    tabVoice.classList.add('active');
    tabText.classList.remove('active');
    voicePanel.classList.remove('hidden');
    textPanel.classList.add('hidden');
    hintText.textContent = '点击麦克风开始';
  }
}

// ── Text mode logic ────────────────────────────────────────────────────────

inputText.addEventListener('input', () => {
  translateBtn.disabled = !inputText.value.trim() || translating;
});

inputText.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    if (!translateBtn.disabled) doTranslate();
  }
});

clearBtn.addEventListener('click', () => {
  inputText.value = '';
  translateBtn.disabled = true;
  setOutput('翻译结果将显示在这里', 'empty');
  translatedText = '';
});

translateBtn.addEventListener('click', doTranslate);

copyBtn.addEventListener('click', () => copyText(translatedText, copyBtn));
voiceCopyBtn.addEventListener('click', () => copyText(voiceTranslatedText, voiceCopyBtn));

settingsBtn.addEventListener('click', () => ipcRenderer.send('open-settings'));
closeBtn.addEventListener('click', () => ipcRenderer.send('close-main'));

async function doTranslate() {
  const text = inputText.value.trim();
  if (!text || translating) return;
  translating = true;
  translateBtn.disabled = true;
  setOutput('', 'loading');
  try {
    const result = await ipcRenderer.invoke('translate', { text, targetLang: targetLang.value });
    translatedText = result;
    setOutput(result);
  } catch (err) {
    setOutput(err.message || '翻译失败', 'error');
    translatedText = '';
  } finally {
    translating = false;
    translateBtn.disabled = false;
  }
}

function setOutput(content, state = '') {
  output.className = 'out-box' + (state ? ' ' + state : '');
  if (state === 'loading') {
    output.innerHTML = `<div class="dots"><span></span><span></span><span></span></div><span style="font-family:'Syne',sans-serif;font-size:12px">翻译中…</span>`;
  } else {
    output.textContent = content;
  }
}

// ── Voice mode logic ───────────────────────────────────────────────────────

micBtn.addEventListener('click', () => {
  isRecording ? stopRecording() : startRecording();
});

async function startRecording() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
  } catch (e) {
    setVoiceStatus('麦克风权限被拒绝', false);
    return;
  }

  audioContext = new AudioContext({ sampleRate: 16000 });
  const source = audioContext.createMediaStreamSource(mediaStream);

  // ScriptProcessor for PCM chunks (512 samples ≈ 32ms at 16kHz)
  processor = audioContext.createScriptProcessor(512, 1, 1);
  let lastSendTime = 0;
  processor.onaudioprocess = (e) => {
    if (!asrReady) return;
    
    // Throttle sends to avoid overwhelming the WebSocket
    const now = Date.now();
    if (now - lastSendTime < 40) return; // Max 25 sends per second
    lastSendTime = now;
    
    const float32 = e.inputBuffer.getChannelData(0);
    // Convert float32 → PCM16
    const pcm16 = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      pcm16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
    }
    ipcRenderer.send('asr-audio-chunk', Buffer.from(pcm16.buffer));
  };

  source.connect(processor);
  processor.connect(audioContext.destination);

  // Connect to ASR WebSocket with target language
  ipcRenderer.send('asr-start', targetLang.value);

  isRecording = true;
  micBtn.classList.add('active');
  dot.classList.add('recording');
  liveBox.style.display = 'block';
  liveBox.textContent = '';
  setVoiceStatus('连接中…', true);
}

function stopRecording() {
  isRecording = false;
  asrReady = false;

  ipcRenderer.send('asr-stop');

  if (processor) { processor.disconnect(); processor = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

  micBtn.classList.remove('active');
  dot.classList.remove('recording');
  setVoiceStatus('点击开始语音识别', false);
  liveBox.classList.remove('speaking');
}

// ── ASR events from main process ──────────────────────────────────────────

ipcRenderer.on('asr-ready', () => {
  asrReady = true;
  setVoiceStatus('正在监听…', true);
});

ipcRenderer.on('asr-speech-start', () => {
  liveBox.classList.add('speaking');
  setVoiceStatus('检测到语音…', true);
});

ipcRenderer.on('asr-speech-stop', () => {
  liveBox.classList.remove('speaking');
  setVoiceStatus('识别中…', true);
});

ipcRenderer.on('asr-transcript-delta', (_, delta) => {
  pendingTranscript += delta;
  liveBox.textContent = pendingTranscript;
  liveBox.scrollTop = liveBox.scrollHeight;
});

ipcRenderer.on('asr-transcript-final', (_, text) => {
  if (!text.trim()) return;
  liveBox.textContent = text;
  pendingTranscript = '';
  setVoiceStatus('翻译中…', true);

  // Translate the recognized text
  clearTimeout(translateDebounce);
  translateDebounce = setTimeout(() => translateVoice(text), 100);
});

ipcRenderer.on('asr-error', (_, msg) => {
  setVoiceStatus('错误: ' + msg, false);
  stopRecording();
});

ipcRenderer.on('asr-closed', () => {
  if (isRecording) {
    setVoiceStatus('连接断开', false);
    stopRecording();
  }
});

async function translateVoice(text) {
  setVoiceOutputLoading();
  try {
    const result = await ipcRenderer.invoke('translate', { text, targetLang: targetLang.value });
    voiceTranslatedText = result;
    setVoiceOutput(result);
    setVoiceStatus('正在监听…', true);
  } catch (e) {
    setVoiceOutput('翻译失败: ' + e.message, true);
    setVoiceStatus('正在监听…', true);
  }
}

function setVoiceStatus(msg, active) {
  voiceStatus.textContent = msg;
  voiceStatus.className = 'voice-status' + (active ? ' active' : '');
}

function setVoiceOutputLoading() {
  voiceOutput.className = 'voice-out-box loading';
  voiceOutput.innerHTML = `<div class="dots"><span></span><span></span><span></span></div>`;
}

function setVoiceOutput(text, err = false) {
  voiceOutput.className = 'voice-out-box' + (err ? ' error' : '');
  voiceOutput.textContent = text;
}

// ── Copy helper ────────────────────────────────────────────────────────────

function copyText(text, btn) {
  if (!text) return;
  navigator.clipboard.writeText(text);
  const orig = btn.innerHTML;
  btn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="#7EFFF5" stroke-width="1.5"><path d="M3 8l4 4 6-7"/></svg>`;
  setTimeout(() => { btn.innerHTML = orig; }, 1500);
}

// ── Config updated ─────────────────────────────────────────────────────────
ipcRenderer.on('config-updated', () => {});
</script>
</body>
</html>
